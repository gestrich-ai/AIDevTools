name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - name: Test (macOS)
        if: matrix.os == 'macos-latest'
        run: swift test --package-path AIDevToolsKit --no-parallel

      - name: Test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: swift test --package-path AIDevToolsKit --no-parallel

  build-macos:
    name: Build macOS
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Build
        run: swift build -c release --product ai-dev-tools-kit --package-path AIDevToolsKit

      - name: Package
        run: tar -czf ai-dev-tools-kit-macos-arm64.tar.gz -C AIDevToolsKit/.build/release ai-dev-tools-kit

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dev-tools-kit-macos-arm64
          path: ai-dev-tools-kit-macos-arm64.tar.gz

  build-linux:
    name: Build Linux
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - name: Build
        run: swift build -c release --product ai-dev-tools-kit --package-path AIDevToolsKit --static-swift-stdlib

      - name: Package
        run: tar -czf ai-dev-tools-kit-linux-x86_64.tar.gz -C AIDevToolsKit/.build/release ai-dev-tools-kit

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dev-tools-kit-linux-x86_64
          path: ai-dev-tools-kit-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-dev-tools-kit-macos-arm64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-dev-tools-kit-linux-x86_64

      - name: Generate checksums
        run: sha256sum ai-dev-tools-kit-macos-arm64.tar.gz ai-dev-tools-kit-linux-x86_64.tar.gz > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --repo ${{ github.repository }} \
            ai-dev-tools-kit-macos-arm64.tar.gz \
            ai-dev-tools-kit-linux-x86_64.tar.gz \
            checksums.txt
