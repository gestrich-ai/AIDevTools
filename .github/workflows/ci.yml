name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - name: Test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit
          echo "::test-fence::"

      - name: Test (macOS)
        if: matrix.os == 'macos-latest'
        # macOS-only test targets (SystemTests, AIDevToolsKitMacTests, etc.)
        # still deadlock under parallel execution due to blocking
        # Process().waitUntilExit() calls in the external SwiftCLI package.
        # Linux parallel works because those targets are excluded.
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit --no-parallel
          echo "::test-fence::"
