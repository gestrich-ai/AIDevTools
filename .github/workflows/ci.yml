name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # BISECT ROUND 1: Split 30 Linux test targets into two halves, run in parallel
  # to find which half contains the deadlocking test(s).
  half-a:
    name: "Half A (15 targets) - parallel"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Test Half A in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "AIDevToolsKitCLITests|AIOutputSDKTests|ChatFeatureTests|ChatServiceTests|ClaudeCLISDKTests|ClaudeChainCLITests|ClaudeChainFeatureTests|ClaudeChainSDKTests|ClaudeChainServiceTests|CredentialFeatureTests|CredentialServiceTests|DataPathsServiceTests|EnvironmentSDKTests|EvalFeatureTests|EvalIntegrationTests"
          echo "::test-fence::"

  half-b:
    name: "Half B (15 targets) - parallel"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Test Half B in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "EvalSDKTests|EvalServiceTests|GitSDKTests|KeychainSDKTests|LoggingSDKTests|PRRadarModelsServiceTests|PipelineFeatureTests|PipelineSDKTests|PlanFeatureTests|PlanServiceTests|RepositorySDKTests|SkillBrowserFeatureTests|SkillScannerSDKTests|SweepServiceTests|WorktreeFeatureTests"
          echo "::test-fence::"
