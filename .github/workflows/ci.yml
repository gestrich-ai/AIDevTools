name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: swift build --package-path AIDevToolsKit

      - name: Test (macOS)
        if: matrix.os == 'macos-latest'
        # --no-parallel prevents Swift Testing's parallel runner from exhausting the
        # 6-thread cooperative pool on the 3-vCPU GitHub Actions macOS runner.
        # Blocking tests (Process.waitUntilExit) are disabled via .enabled(if: CI == nil)
        # but parallel execution still deadlocks on Swift 6.2 / macOS 14; serialized
        # execution completes reliably.
        run: swift test --package-path AIDevToolsKit --no-parallel
