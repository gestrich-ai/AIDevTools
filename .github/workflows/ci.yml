name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # BISECT: Both halves passed individually. Test all 30 targets together
  # to confirm deadlock only happens with full suite.
  all-parallel:
    name: "All 30 targets - parallel"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Test all in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit
          echo "::test-fence::"
