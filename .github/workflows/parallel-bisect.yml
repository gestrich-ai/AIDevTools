name: Parallel Bisect (Linux)

on:
  push:
    branches: [fix/parallel-testing-linux]
  workflow_dispatch:

jobs:
  # Round 1 confirmed: Half A (A-E, 18 targets) deadlocks, Half B (G-W) passes.
  # Round 2: Bisect Half A into two quarters.

  # Quarter A1: first 9 targets from Half A
  quarter-a1:
    name: "Quarter A1 (AIDevTools..ClaudeChainFeature)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run Quarter A1 in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "AIDevToolsKitCLITests|AIOutputSDKTests|ArchitecturePlannerFeatureTests|ArchitecturePlannerServiceTests|ChatFeatureTests|ChatServiceTests|ClaudeCLISDKTests|ClaudeChainCLITests|ClaudeChainFeatureTests" \
            2>&1 | tail -50
          echo "::test-fence::"

  # Quarter A2: last 9 targets from Half A
  quarter-a2:
    name: "Quarter A2 (ClaudeChainSDK..EvalService)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run Quarter A2 in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "ClaudeChainSDKTests|ClaudeChainServiceTests|CredentialFeatureTests|CredentialServiceTests|DataPathsServiceTests|EnvironmentSDKTests|EvalFeatureTests|EvalSDKTests|EvalServiceTests" \
            2>&1 | tail -50
          echo "::test-fence::"

  # Cross-quarter: A1 + Half B (to check if A1 alone causes deadlock with more targets)
  quarter-a1-plus-half-b:
    name: "Quarter A1 + Half B"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run Quarter A1 + Half B in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "AIDevToolsKitCLITests|AIOutputSDKTests|ArchitecturePlannerFeatureTests|ArchitecturePlannerServiceTests|ChatFeatureTests|ChatServiceTests|ClaudeCLISDKTests|ClaudeChainCLITests|ClaudeChainFeatureTests|GitSDKTests|KeychainSDKTests|LoggingSDKTests|PRRadarModelsServiceTests|PipelineFeatureTests|PipelineSDKTests|PlanFeatureTests|PlanServiceTests|RepositorySDKTests|SkillBrowserFeatureTests|SkillScannerSDKTests|SweepServiceTests|WorktreeFeatureTests" \
            2>&1 | tail -50
          echo "::test-fence::"

  # Cross-quarter: A2 + Half B
  quarter-a2-plus-half-b:
    name: "Quarter A2 + Half B"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run Quarter A2 + Half B in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "ClaudeChainSDKTests|ClaudeChainServiceTests|CredentialFeatureTests|CredentialServiceTests|DataPathsServiceTests|EnvironmentSDKTests|EvalFeatureTests|EvalSDKTests|EvalServiceTests|GitSDKTests|KeychainSDKTests|LoggingSDKTests|PRRadarModelsServiceTests|PipelineFeatureTests|PipelineSDKTests|PlanFeatureTests|PlanServiceTests|RepositorySDKTests|SkillBrowserFeatureTests|SkillScannerSDKTests|SweepServiceTests|WorktreeFeatureTests" \
            2>&1 | tail -50
          echo "::test-fence::"
