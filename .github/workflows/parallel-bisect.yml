name: Parallel Bisect (Linux)

on:
  push:
    branches: [fix/parallel-testing-linux]
  workflow_dispatch:

jobs:
  # The fix: WorkflowService now uses async/await instead of DispatchSemaphore+Task
  # which deadlocked on Linux's cooperative thread pool.
  # Run ALL tests in parallel to verify the fix.
  all-parallel:
    name: All tests parallel (verify fix)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run all tests in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit
          echo "::test-fence::"
