name: Parallel Bisect (Linux)

on:
  push:
    branches: [fix/parallel-testing-linux]
  workflow_dispatch:

jobs:
  # Round 1: Half A deadlocks, Half B passes.
  # Round 2: Quarter A1 deadlocks, Quarter A2 passes.
  # Round 3: Bisect Quarter A1 (9 targets) into Eighth A1a (5) and Eighth A1b (4).

  # Eighth A1a: first 5 targets
  eighth-a1a:
    name: "Eighth A1a (AIDevToolsKitCLI..ChatFeature)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run Eighth A1a in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "AIDevToolsKitCLITests|AIOutputSDKTests|ArchitecturePlannerFeatureTests|ArchitecturePlannerServiceTests|ChatFeatureTests" \
            2>&1 | tail -50
          echo "::test-fence::"

  # Eighth A1b: last 4 targets
  eighth-a1b:
    name: "Eighth A1b (ChatService..ClaudeChainFeature)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run Eighth A1b in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "ChatServiceTests|ClaudeCLISDKTests|ClaudeChainCLITests|ClaudeChainFeatureTests" \
            2>&1 | tail -50
          echo "::test-fence::"

  # Combined: all 9 Quarter A1 targets (control — should still deadlock)
  quarter-a1-control:
    name: "Quarter A1 Control (all 9)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run Quarter A1 in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "AIDevToolsKitCLITests|AIOutputSDKTests|ArchitecturePlannerFeatureTests|ArchitecturePlannerServiceTests|ChatFeatureTests|ChatServiceTests|ClaudeCLISDKTests|ClaudeChainCLITests|ClaudeChainFeatureTests" \
            2>&1 | tail -50
          echo "::test-fence::"

  # Cross: Eighth A1a + A1b swapped pairs (to detect interaction effects)
  eighth-a1a-plus-a2:
    name: "Eighth A1a + Quarter A2"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run Eighth A1a + Quarter A2 in parallel
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit \
            --filter "AIDevToolsKitCLITests|AIOutputSDKTests|ArchitecturePlannerFeatureTests|ArchitecturePlannerServiceTests|ChatFeatureTests|ClaudeChainSDKTests|ClaudeChainServiceTests|CredentialFeatureTests|CredentialServiceTests|DataPathsServiceTests|EnvironmentSDKTests|EvalFeatureTests|EvalSDKTests|EvalServiceTests" \
            2>&1 | tail -50
          echo "::test-fence::"
