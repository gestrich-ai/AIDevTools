name: Parallel Bisect (Linux)

on:
  push:
    branches: [fix/parallel-testing-linux]
  workflow_dispatch:

jobs:
  # Rounds 1-3 narrowed deadlock to Eighth A1b (4 targets):
  #   ChatServiceTests, ClaudeCLISDKTests, ClaudeChainCLITests, ClaudeChainFeatureTests
  # Round 4: Test each individually + pair splits to find the combination.

  # Individual canaries
  solo-chatservice:
    name: "Solo: ChatServiceTests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit --filter "ChatServiceTests" 2>&1 | tail -50
          echo "::test-fence::"

  solo-claudeclisdk:
    name: "Solo: ClaudeCLISDKTests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit --filter "ClaudeCLISDKTests" 2>&1 | tail -50
          echo "::test-fence::"

  solo-claudechaincli:
    name: "Solo: ClaudeChainCLITests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit --filter "ClaudeChainCLITests" 2>&1 | tail -50
          echo "::test-fence::"

  solo-claudechainfeature:
    name: "Solo: ClaudeChainFeatureTests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit --filter "ClaudeChainFeatureTests" 2>&1 | tail -50
          echo "::test-fence::"

  # Pair splits
  pair-1:
    name: "Pair: ChatService + ClaudeCLISDK"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit --filter "ChatServiceTests|ClaudeCLISDKTests" 2>&1 | tail -50
          echo "::test-fence::"

  pair-2:
    name: "Pair: ClaudeChainCLI + ClaudeChainFeature"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit --filter "ClaudeChainCLITests|ClaudeChainFeatureTests" 2>&1 | tail -50
          echo "::test-fence::"

  # Control: all 4 (should deadlock)
  control-all4:
    name: "Control: All 4 A1b targets"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install deps
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Run
        run: |
          echo "::stop-commands::test-fence"
          swift test --package-path AIDevToolsKit --filter "ChatServiceTests|ClaudeCLISDKTests|ClaudeChainCLITests|ClaudeChainFeatureTests" 2>&1 | tail -50
          echo "::test-fence::"
